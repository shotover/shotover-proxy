---
sources:
  - Valkey:
      name: "valkey"
      listen_addr: "127.0.0.1:6379"
      chain:
        - DebugForceEncode:
            name: "debug-force-encode"
            encode_requests: true
            encode_responses: true
        - ValkeySinkSingle:
            name: "valkey-sink"
            remote_address: "127.0.0.1:1111"
            connect_timeout_ms: 3000
