---
sources:
  - Valkey:
      name: "valkey"
      listen_addr: "127.0.0.1:6379"
      connection_limit: 3000000
      chain:
        - Tee:
            name: "tee"
            behavior: Ignore
            buffer_size: 10000
            chain:
              - QueryTypeFilter:
                  name: "tee-filter"
                  DenyList: [Read]
              - DebugReturner:
                  name: "tee-returner"
                  Valkey: "41"
        - DebugReturner:
            name: "returner"
            Valkey: "42"
