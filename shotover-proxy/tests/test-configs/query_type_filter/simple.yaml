---
sources:
  - Valkey:
      name: "valkey1"
      listen_addr: "127.0.0.1:6379"
      connection_limit: 3000000
      chain:
        - QueryTypeFilter:
            name: "query-type-filter"
            DenyList: [Write]
        - DebugReturner:
            name: "debug-returner"
            Valkey: "42"
  - Valkey:
      name: "valkey2"
      listen_addr: "127.0.0.1:6380"
      connection_limit: 3000000
      chain:
        - QueryTypeFilter:
            name: "query-type-filter1"
            AllowList: [Read]
        - DebugReturner:
            name: "debug-returner1"
            Valkey: "42"
