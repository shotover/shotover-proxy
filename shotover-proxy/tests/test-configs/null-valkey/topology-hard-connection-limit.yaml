---
sources:
  - Valkey:
      name: "valkey"
      listen_addr: "127.0.0.1:6379"
      connection_limit: 1
      hard_connection_limit: true
      chain:
        - QueryCounter:
            name: "valkey-chain-counter"
            counter_name : "valkey-chain"
        - NullSink
            name: "null-sink"
